<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Shadow (Bayangan Hitam Tebal di Belakang) -->
  <rect x="10" y="10" width="80" height="80" rx="20" ry="20" fill="#000000" />

  <!-- Kartu Utama Putih dengan Border Hitam -->
  <rect x="5" y="5" width="80" height="80" rx="20" ry="20" fill="#ffffff" stroke="#000000" stroke-width="7" />

  <!-- Teks DA (Font Bold Bebas-lh / Sans-Serif) -->
  <text 
    x="45" 
    y="57" 
    font-family="system-ui, -apple-system, 'Space Grotesk', 'Syne', sans-serif" 
    font-size="38" 
    font-weight="900" 
    fill="#000000" 
    text-anchor="middle" 
    dominant-baseline="middle"
  >
    DA
  </text>
</svg>
